            <h1 style="display: none">生产者消费者问题</h1>
            
            <div class="markdown-body">
              <h2 id="生产者消费者问题"><a href="#生产者消费者问题" class="headerlink" title="生产者消费者问题"></a>生产者消费者问题</h2><p><code>生产者与消费者问题是多线程同步问题的经典案例。也称有限缓冲问题。</code></p>
<figure class="highlight markdown"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><code class="hljs markdown"><span class="hljs-section"># 什么是生产者消费者问题</span><br>该问题描述了共享固定大小缓冲区的线程，生产者的主要作用是生成一定量的数据放到缓冲区，消费者也在缓冲区消耗这些数据。<br>这类问题的关键在于保证生产者不会在缓冲区满时加入数据，消费者也不会下缓冲区空时消耗数据。<br><br></code></pre></td></tr></table></figure>

<figure class="highlight markdown"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><code class="hljs markdown"><span class="hljs-section"># 如何解决这类问题</span><br>生产者在缓冲区满时休眠，等到下次消费者消耗缓冲区中的数据的时候，生产者才能被唤醒，开始往缓冲区添加数据。<br>同样，让消费者在缓冲区空时进入休眠，等到生产者往缓冲区添加数据之后，再唤醒消费者。<br><br>通常采用进程间通信的方法解决该问题，常用的方法有信号灯法等。如果解决方法不够完善，则容易出现死锁的情况。出现死锁时，两个线程都会陷入休眠，等待对方唤醒自己<br></code></pre></td></tr></table></figure>
<span id="more"></span>


<h3 id="问题"><a href="#问题" class="headerlink" title="问题"></a>问题</h3><figure class="highlight markdown"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><code class="hljs markdown">桌上有一空盘，最多允许存放一个水果。爸爸可向盘中放一个水果或放一个橘子，儿子专等吃盘中的橘子。女儿专等吃苹果。<br>试用P、V操作和Java程序实现爸爸，儿子，女儿三个并发进程的同步。<br></code></pre></td></tr></table></figure>

<h4 id="P、V操作"><a href="#P、V操作" class="headerlink" title="P、V操作"></a>P、V操作</h4><figure class="highlight markdown"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><code class="hljs markdown">根据题意，我们知道父亲是生产者，儿子、女儿是消费者。盘中的水果是共享资源。<br>因为盘中最多允许存放一个水果，在生产前需要判断是否为满。<br><br>利用互斥信号量mutex实现互斥，利用empty信号量来判断盘中是否为空。<br>利用or信号量和ap信号量来判断盘中的橘子和苹果的数量。<br>两个函数判断是否是橘子或者苹果。put(or) put(ap)<br><br>设置初始值：<br>mutex = 1  empty = 1  or = 0  ap = 0<br></code></pre></td></tr></table></figure>

<figure class="highlight markdown"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br></pre></td><td class="code"><pre><code class="hljs markdown">三个进程<br>父亲：<br>P(empty)<br>if(put(or))<br><span class="hljs-code">	V(or)</span><br><span class="hljs-code">else</span><br><span class="hljs-code">	V(ap)</span><br><span class="hljs-code"></span><br><br>儿子：<br>P(or)<br>V(empty)<br><br>女儿：<br>P(ap)<br>v(empty)<br></code></pre></td></tr></table></figure>



<h4 id="java程序"><a href="#java程序" class="headerlink" title="java程序"></a>java程序</h4><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br></pre></td><td class="code"><pre><code class="hljs java"><span class="hljs-keyword">import</span> java.util.Random;<br><br><span class="hljs-keyword">public</span> <span class="hljs-class"><span class="hljs-keyword">class</span> <span class="hljs-title">Fruit</span> </span>&#123;<br><br>    <span class="hljs-comment">/**</span><br><span class="hljs-comment">     * empty 的取值有不同的意义：</span><br><span class="hljs-comment">     * 0  表示盘中无水果</span><br><span class="hljs-comment">     * 1  表示盘中的水果是橘子</span><br><span class="hljs-comment">     * 2  表示盘中的水果是苹果</span><br><span class="hljs-comment">     */</span><br>    <span class="hljs-keyword">private</span> <span class="hljs-keyword">int</span> empty = <span class="hljs-number">0</span>;<br><br>    <span class="hljs-comment">//生产资源，，有生产者线程调用</span><br>    <span class="hljs-function"><span class="hljs-keyword">public</span> <span class="hljs-keyword">synchronized</span> <span class="hljs-keyword">void</span> <span class="hljs-title">put</span><span class="hljs-params">()</span></span>&#123;<br>        <span class="hljs-keyword">while</span>(empty != <span class="hljs-number">0</span>)&#123;<br>            <span class="hljs-keyword">try</span>&#123;<br>                System.out.println(<span class="hljs-string">&quot;盘中有水果，生产者正在等待&quot;</span>);<br>                wait();<br>            &#125;<span class="hljs-keyword">catch</span> (Exception e)&#123;<br>            &#125;<br>        &#125;<br>        <span class="hljs-comment">//此时盘中无水果</span><br>        Random random = <span class="hljs-keyword">new</span> Random();<br>        <span class="hljs-keyword">int</span> randomInt = random.nextInt(<span class="hljs-number">2</span>) + <span class="hljs-number">1</span>;<br>        empty = randomInt;<br>        <span class="hljs-keyword">if</span>(empty == <span class="hljs-number">1</span>)&#123;<br>            System.out.println(<span class="hljs-string">&quot;爸爸放入橘子&quot;</span>);<br>        &#125;<span class="hljs-keyword">else</span>&#123;<br>            System.out.println(<span class="hljs-string">&quot;爸爸放入苹果&quot;</span>);<br>        &#125;<br>        <span class="hljs-keyword">this</span>.notifyAll();<br>    &#125;<br><br><br>    <span class="hljs-comment">//消耗资源，有消费者线程调用</span><br>    <span class="hljs-function"><span class="hljs-keyword">public</span> <span class="hljs-keyword">synchronized</span> <span class="hljs-keyword">void</span> <span class="hljs-title">get</span><span class="hljs-params">()</span></span>&#123;<br>        <span class="hljs-keyword">while</span>(empty == <span class="hljs-number">0</span>)&#123;<br>            <span class="hljs-keyword">try</span>&#123;<br>                System.out.println(<span class="hljs-string">&quot;盘中无水果，消费者等待&quot;</span>);<br>                wait();<br>            &#125;<span class="hljs-keyword">catch</span> (Exception e)&#123;<br>                e.printStackTrace();<br>            &#125;<br>        &#125;<br><br>        <span class="hljs-comment">//此时盘中有水果</span><br>        empty = <span class="hljs-number">0</span>;<br>        System.out.println(<span class="hljs-string">&quot;盘中无水果&quot;</span>);<br>        <span class="hljs-keyword">this</span>.notifyAll();<br>    &#125;<br><br><br><br>    <span class="hljs-function"><span class="hljs-keyword">public</span> <span class="hljs-keyword">static</span> <span class="hljs-keyword">void</span> <span class="hljs-title">main</span><span class="hljs-params">(String[] args)</span> </span>&#123;<br><br>        Fruit fruit = <span class="hljs-keyword">new</span> Fruit();<br><br>        Thread father = <span class="hljs-keyword">new</span> Thread(<span class="hljs-keyword">new</span> Runnable() &#123;<br>            <span class="hljs-meta">@Override</span><br>            <span class="hljs-function"><span class="hljs-keyword">public</span> <span class="hljs-keyword">void</span> <span class="hljs-title">run</span><span class="hljs-params">()</span> </span>&#123;<br>                <span class="hljs-keyword">while</span>(<span class="hljs-keyword">true</span>)<br>                    fruit.put();<br>            &#125;<br>        &#125;);<br><br>        Thread daughter = <span class="hljs-keyword">new</span> Thread(<span class="hljs-keyword">new</span> Runnable() &#123;<br>            <span class="hljs-meta">@Override</span><br>            <span class="hljs-function"><span class="hljs-keyword">public</span> <span class="hljs-keyword">void</span> <span class="hljs-title">run</span><span class="hljs-params">()</span> </span>&#123;<br>                <span class="hljs-keyword">while</span>(<span class="hljs-keyword">true</span>)&#123;<br>                    <span class="hljs-keyword">while</span>(fruit.empty == <span class="hljs-number">2</span>)&#123;<br>                        System.out.println(<span class="hljs-string">&quot;女儿拿到苹果&quot;</span>);<br>                        fruit.get();<br>                    &#125;<br>                &#125;<br>            &#125;<br>        &#125;);<br><br>        Thread son = <span class="hljs-keyword">new</span> Thread(<span class="hljs-keyword">new</span> Runnable() &#123;<br>            <span class="hljs-meta">@Override</span><br>            <span class="hljs-function"><span class="hljs-keyword">public</span> <span class="hljs-keyword">void</span> <span class="hljs-title">run</span><span class="hljs-params">()</span> </span>&#123;<br>                <span class="hljs-keyword">while</span> (<span class="hljs-keyword">true</span>)&#123;<br>                    <span class="hljs-keyword">while</span>(fruit.empty == <span class="hljs-number">1</span>)&#123;<br>                        System.out.println(<span class="hljs-string">&quot;儿子拿到橘子&quot;</span>);<br>                        fruit.get();<br>                    &#125;<br>                &#125;<br>            &#125;<br>        &#125;);<br>        son.start();<br>        daughter.start();<br>        father.start();<br>    &#125;<br>&#125;<br></code></pre></td></tr></table></figure>
